<style>

/* visible range */
function getRange(){
  if(S.view==="month"){const s=startOfWeek(startOfMonth(S.cursor),WK_START);return {start:s,end:addDays(s,42)};}
  if(S.view==="week"){const s=startOfWeek(S.cursor,WK_START);return {start:s,end:addDays(s,7)};}
  if(S.view==="day")return {start:startOfDay(S.cursor),end:endOfDay(S.cursor)};
  return {start:startOfDay(S.cursor),end:addDays(S.cursor,30)};
}
function getInstances(){
  const r=getRange();const vis=new Set(S.calendars.filter(c=>c.visible).map(c=>c.id));
  const visP=new Set(S.providers.filter(p=>p.visible).map(p=>p.id));
  const visR=new Set(S.resources.filter(r=>r.visible).map(r=>r.id));
  const visL=new Set((S.locations||[]).filter(l=>l.visible!==false).map(l=>l.id));
  const allLocVisible=!S.locations||S.locations.every(l=>l.visible!==false);
  const provOK=e=>{const ap=e.assignedProviders||[];return ap.length===0||ap.some(p=>visP.has(p.providerId));};
  const resOK=e=>{const ar=e.resourceIds||[];return ar.length===0||ar.some(id=>visR.has(id));};
  const locOK=e=>{if(allLocVisible)return true;const lid=eventLocationId(e);return lid==null||visL.has(lid);};
  let out=[];
  for(const e of S.events){if(e.calendarId&&!vis.has(e.calendarId))continue;if(!provOK(e))continue;if(!resOK(e))continue;if(!locOK(e))continue;out=out.concat(expandEvent(e,r.start,r.end));}
  if(S.query.trim()){const q=S.query.toLowerCase();out=out.filter(i=>[i.title,i.location,i.description].some(v=>(v||"").toLowerCase().includes(q)));}
  return out.sort((a,b)=>a.start-b.start);
}

/* ============================= reminders ================================ */
function scheduleReminders(){
  timers.forEach(clearTimeout);timers=[];
  const horizon=addDays(new Date(),1);const all=[];
  for(const e of S.events)all.push(...expandEvent(e,startOfDay(new Date()),horizon));
  for(const inst of all)for(const r of (inst.reminders||[])){
    const ms=(inst.start.getTime()-r.minutes*60000)-Date.now();const key=inst.instanceId+":"+r.minutes;
    if(ms>0&&ms<DAY_MS&&!fired.has(key)){
      timers.push(setTimeout(()=>{fired.add(key);
        showToast(inst.title,fmtTime(inst.start)+" · "+(r.minutes===0?"now":r.minutes+" min")+" reminder");
        try{if(typeof Notification!=="undefined"&&Notification.permission==="granted")new Notification(inst.title,{body:fmtTime(inst.start)});}catch(e){}
      },ms));}
  }
}

function miniMonthHTML(){
  const m=startOfMonth(S.cursor);const start=startOfWeek(startOfMonth(m),WK_START);
  const today=new Date();let cells="";
  const dows=Array.from({length:7},(_,i)=>DOW[(i+WK_START)%7][0]);
  cells+=dows.map(d=>'<div style="font-size:10px;color:var(--mut2);font-weight:600;padding:2px 0">'+d+'</div>').join("");
  for(let i=0;i<42;i++){const d=addDays(start,i);const inM=d.getMonth()===m.getMonth();const tod=isSameDay(d,today);const sel=isSameDay(d,S.cursor);
    cells+='<button class="cc-btn" onclick="App.pickDay('+d.getTime()+')" style="font-size:11.5px;padding:4px 0;border:none;border-radius:7px;color:'
      +(tod?"#fff":inM?"var(--ink)":"var(--mut3)")+';background:'+(tod?"var(--teal)":sel?"#d1ede9":"transparent")+';font-weight:'+(tod||sel?700:500)+'">'+d.getDate()+'</button>';}
  return '<div class="ic" style="justify-content:space-between;margin-bottom:8px"><div style="font-weight:600;font-size:13.5px">'+MONTHS[m.getMonth()].slice(0,3)+" "+m.getFullYear()+'</div>'
    +'<div class="flex" style="gap:2px"><button class="cc-btn icon-btn" aria-label="Previous month" style="width:26px;height:26px;padding:4px" onclick="App.miniNav(-1)">'+chev(-1,15)+'</button>'
    +'<button class="cc-btn icon-btn" aria-label="Next month" style="width:26px;height:26px;padding:4px" onclick="App.miniNav(1)">'+chev(1,15)+'</button></div></div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center">'+cells+'</div>';
}

function monthHTML(){
  const r=getRange();const days=Array.from({length:42},(_,i)=>addDays(r.start,i)).filter(d=>{const wd=d.getDay();return wd!==0&&wd!==6;});
  const dows=DOW.slice(1,6);const inst=getInstances();
  const byDay={};for(const i of inst){const k=dateKey(startOfDay(i.start));(byDay[k]=byDay[k]||[]).push(i);}

function timeGridHTML(days){

  if(days>1){

    function anyProvWorking(dow){return visProv.some(p=>{const wh=p.workingHours;return wh&&wh[dow]&&wh[dow].length>0;});}
    dayListFull=dayListFull.filter(d=>{const wd=d.getDay();if(wd===0||wd===6)return anyProvWorking(wd);return true;});
  }
  const dayList=dayListFull;const actualDays=dayList.length;

    let evs=blocks.map(function(b){var e=b.e,top=b.top,h=b.h,left=b.left,width=b.width;var g=e.isGroup;var arr=grpCount(e);var ci=arr.filter(a=>a.status==='checked-in').length;

    let nowline=(tod&&nowTop>0&&nowTop<24*HOUR)?'<div style="position:absolute;top:'+nowTop+'px;left:0;right:0;height:2px;background:#be123c;z-index:5"><div style="position:absolute;left:-4px;top:-4px;width:9px;height:9px;border-radius:50%;background:#be123c"></div></div>':"";
    return '<div style="border-left:1px solid var(--b2);position:relative">'+hours+evs+nowline+'</div>';}).join("");
  let scrollArea='<div id="grid-scroll" class="scroll" style="flex:1;overflow-y:auto;position:relative"><div style="display:grid;grid-template-columns:56px repeat('+actualDays+',1fr);position:relative">'+gutter+cols+'</div></div>';

function buildKpiStrip(instances){
  const solo=instances.filter(i=>!i.isGroup);
  const counts={};solo.forEach(i=>{const s=apptStatusOf(i);counts[s]=(counts[s]||0)+1;});
  const tele=instances.filter(i=>i.telehealth).length;
  const formsDue=instances.filter(i=>{const pw=i.paperwork||{};const k=Object.keys(pw);return k.length&&k.some(x=>!pw[x]);}).length;
  const notConfirmed=counts.scheduled||0;
  S._kpiInstances=instances;
  const kpi=(label,val,color,filter)=>'<div onclick="App.kpiDrilldown(\''+filter+'\')" style="flex:1;min-width:96px;background:#fff;border:1px solid var(--b2);border-radius:12px;padding:10px 14px;cursor:pointer;transition:box-shadow .12s,border-color .12s" onmouseenter="this.style.borderColor=\'var(--teal)\';this.style.boxShadow=\'0 2px 8px rgba(15,118,110,.12)\'" onmouseleave="this.style.borderColor=\'var(--b2)\';this.style.boxShadow=\'none\'"><div style="font-size:22px;font-weight:700;color:'+(color||"var(--ink)")+';font-family:\'Fraunces\',serif">'+val+'</div><div style="font-size:11px;color:var(--mut2);font-weight:600;text-transform:uppercase;letter-spacing:.03em">'+label+'</div></div>';
  return '<div class="ic" style="gap:10px;flex-wrap:wrap;margin-bottom:16px">'
    +kpi("Appointments",instances.length,"","all")
    +kpi("Not confirmed",notConfirmed,notConfirmed?"#b45309":"var(--ink)","notconfirmed")
    +kpi("No-show / cancel",(counts["no-show"]||0)+(counts["late-cancel"]||0)+(counts.cancelled||0),"#be123c","noshow")
    +kpi("Telehealth",tele,"#0891b2","telehealth")
    +kpi("Forms due",formsDue,formsDue?"#b45309":"var(--ink)","formsdue")
    +'</div>';
}

        +'<span style="font-size:11px;color:var(--mut2);margin-left:auto;white-space:nowrap">'+fmtTime(i.start)+'</span></div>'
        +'<div style="font-size:11.5px;color:var(--mut);margin-top:2px">'+ic("user",11)+' '+esc(prov)+'</div>'

          +(other?'<span>'+ic("phone",10)+' '+esc(other)+'</span>':'')

      +'</div>'

  lucide.createIcons();

function agendaHTML(){

/* ===================== customizable context menu ======================= */
/* Generic framework: openContextMenu(x,y,scope,payload) merges built-in
   items for the scope with admin-defined custom items. Drop it onto any new
   surface by adding oncontextmenu="return App.ctx(event,'<scope>',key,ts)". */
let ctxItems=[];
function ctxTokens(scope,payload){
  const t={today:fmtDMY(new Date())};
  if(scope==='event'&&payload.event){const ev=payload.event;const d=payload.ts?new Date(payload.ts):new Date(ev.start);const dk=dateKey(d);
    t.title=ev.title;t.id=ev.id;t.date=fmtDMY(d);t.time=fmtRange(new Date(ev.start),new Date(ev.end));
    t.location=ev.location||"";t.calendar=(calById(ev.calendarId)||{}).name||"";
    const pat=ev.patientId?patientById(ev.patientId):null;
    t.patient=pat?pat.name:"";t.mrn=pat?(pat.mrn||""):"";t.email=pat?(pat.email||""):"";
    t.status=APPT_STATUS[(ev.statusByDate&&ev.statusByDate[dk]&&ev.statusByDate[dk].status)||"scheduled"].label;
    t.confirmed=confirmState(ev,dk)?"yes":"no";
    t.copay=fmtMoney(copayDue(ev));t.paid=copayPaid(ev,dk)?"yes":"no";t.balance=fmtMoney(patientBalance(ev.patientId));}
  else if(scope==='day'&&payload.ts){t.date=fmtDMY(new Date(payload.ts));}
  else if(scope==='calendar'&&payload.calendar){t.calendar=payload.calendar.name;t.id=payload.calendar.id;}
  else if(scope==='provider'&&payload.provider){t.provider=payload.provider.name;t.credential=payload.provider.credential;t.id=payload.provider.id;}
  else if(scope==='resource'&&payload.resource){t.room=payload.resource.name;t.resource=payload.resource.name;t.id=payload.resource.id;}
  else if(scope==='patient'&&payload.patient){t.patient=payload.patient.name;t.mrn=payload.patient.mrn||"";t.email=payload.patient.email||"";t.id=payload.patient.id;}
  else if(scope==='type'&&payload.type){t.type=payload.type.name;t.duration=payload.type.duration;t.id=payload.type.id;}
  return t;
}
function resolveTpl(str,map){return String(str==null?"":str).replace(/\{(\w+)\}/g,(m,k)=>map[k]!=null?map[k]:m);}
function copyText(t){try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t);return;}}catch(e){}
  try{var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);}catch(e){}}
function runCustomItem(it,scope,payload){
  const val=resolveTpl(it.value,ctxTokens(scope,payload));
  if(it.actionType==='link'){try{window.open(val,'_blank');}catch(e){}}
  else if(it.actionType==='copy'){copyText(val);showToast("Copied",val);}
  else{showToast(it.label,val);}
}
function buildMenu(scope,payload){
  const items=[];
  if(scope==='event'&&payload.event){const ev=payload.event;
    items.push({head:ev.title});
    items.push({label:ev.isGroup?'Open session roster':'Open / edit',icon:ev.isGroup?'users':'pencil',run:()=>App.openEvent(ev.id,payload.ts)});
    if(!ev.isGroup){const dk=dateKey(new Date(payload.ts||ev.start));const cur=(ev.statusByDate&&ev.statusByDate[dk]&&ev.statusByDate[dk].status)||"scheduled";
      // front desk: confirmation + check-in / missed
      items.push({sep:true});
      items.push({head:(confirmState(ev,dk)?"✓ Patient confirmed":"Awaiting confirmation")+" · "+APPT_STATUS[cur].label});
      if(cur!=="checked-in")items.push({label:'Check in',icon:'log-in',run:()=>App.setApptStatus(ev.id,dk,'checked-in')});
      if(cur!=="confirmed"&&!confirmState(ev,dk))items.push({label:'Mark confirmed',icon:'check',run:()=>App.setApptStatus(ev.id,dk,'confirmed')});
      if(cur!=="no-show")items.push({label:'Mark missed (no-show)',icon:'user-x',danger:true,run:()=>App.setApptStatus(ev.id,dk,'no-show')});
      // billing: co-pay + outstanding balance
      if(can("collect_payment")){const due=copayDue(ev),paid=copayPaid(ev,dk),bal=patientBalance(ev.patientId);
        items.push({sep:true});
        items.push({head:"Co-pay "+fmtMoney(due)+(paid?" · collected ✓":" · due")+(bal>0?"  •  Balance "+fmtMoney(bal):"")});
        if(due>0&&!paid)items.push({label:'Collect co-pay ('+fmtMoney(due)+')',icon:'dollar-sign',run:()=>App.collectCopay(ev.id,dk)});
        if(paid)items.push({label:'Mark co-pay unpaid',icon:'circle-x',run:()=>App.uncollectCopay(ev.id,dk)});
        if(bal>0)items.push({label:'Patient balance: '+fmtMoney(bal),icon:'file-text',run:()=>showToast(((patientById(ev.patientId)||{}).name||"Patient"),"Outstanding balance "+fmtMoney(bal))});
      }
      items.push({sep:true});
      items.push({head:"Set status"});
      [["completed","check-check"],["late-cancel","clock"],["cancelled","circle-x"]].forEach(([s,icn])=>{if(cur!==s)items.push({label:APPT_STATUS[s].label,icon:icn,danger:NEGATIVE_STATUS.indexOf(s)>-1,run:()=>App.setApptStatus(ev.id,dk,s)});});
      items.push({sep:true});}
    items.push({label:'Duplicate',icon:'copy',run:()=>App.ctxDuplicate(ev.id)});
    items.push({label:'Delete',icon:'trash-2',danger:true,run:()=>{if(!requirePerm("delete"))return;pushUndo();deleteEvent(ev.id);render();showToast("Deleted",ev.title);}});
  }else if(scope==='day'){
    items.push({label:'New appointment here',icon:'plus',run:()=>App.newEvent(payload.ts)});
    items.push({label:'New event here',icon:'calendar-plus',run:()=>{S.edMode='event';App.newEvent(payload.ts);}});
    if(groupSessionsAllowed()&&(S.ui.prefs||{}).ctxGroup!==false){items.push({label:'New group session',icon:'users',run:()=>App.newGroupEvent(payload.ts)});}
    items.push({sep:true});
    items.push({label:'View this day',icon:'calendar',run:()=>{S.cursor=new Date(payload.ts);S.view='day';render();}});
    items.push({label:'Print day sheet',icon:'printer',run:()=>App.printDay(payload.ts)});
  }else if(scope==='calendar'&&payload.calendar){const c=payload.calendar;
    items.push({head:c.name});
    items.push({label:c.visible?'Hide calendar':'Show calendar',icon:c.visible?'eye-off':'eye',run:()=>App.toggleCal(c.id)});
    items.push({label:'Share…',icon:'share-2',run:()=>App.openShare(c.id)});
    if(S.calendars.length>1)items.push({label:'Remove calendar',icon:'trash-2',danger:true,run:()=>App.removeCal(c.id)});
  }else if(scope==='provider'&&payload.provider){const p=payload.provider;const cl=caseloadOf(p);
    items.push({head:p.name+" · panel "+cl.cur+"/"+cl.cap});
    items.push({label:p.acceptingNew!==false?'Stop accepting new patients':'Mark accepting new patients',icon:p.acceptingNew!==false?'user-x':'user',run:()=>App.toggleAccepting(p.id)});
    items.push({label:p.visible?'Hide from calendar':'Show on calendar',icon:p.visible?'eye-off':'eye',run:()=>App.toggleProvider(p.id)});
    items.push({label:'Show only this provider',icon:'user',run:()=>App.provFocus(p.id)});
    items.push({label:'Show all providers',icon:'users',run:()=>App.provShowAll()});
    items.push({label:'Export schedule (.ics)',icon:'download',run:()=>{exportICS(S.events.filter(e=>(e.assignedProviders||[]).some(x=>x.providerId===p.id)));}});
    items.push({label:'Copy live calendar feed',icon:'calendar',run:()=>App.providerFeed(p.id)});
    items.push({label:'Absence workflow…',icon:'user-x',danger:true,run:()=>App.absOpen(p.id)});
  }else if(scope==='resource'&&payload.resource){const r=payload.resource;
    items.push({head:r.name});
    items.push({label:r.visible?'Hide from calendar':'Show on calendar',icon:r.visible?'eye-off':'eye',run:()=>App.toggleResource(r.id)});
    items.push({label:'Show only this room',icon:'door-open',run:()=>App.resFocus(r.id)});
    items.push({label:'Show all rooms',icon:'layout-grid',run:()=>App.resShowAll()});
  }else if(scope==='patient'&&payload.patient){const p=payload.patient;
    items.push({head:p.name+(p.mrn?' · '+p.mrn:'')});
    if(payload.inSession){
      items.push({label:'Check in',icon:'log-in',run:()=>App.gsCheckIn(p.id)});
      items.push({label:'Check out',icon:'log-out',run:()=>App.gsCheckOut(p.id)});
      items.push({label:'Mark no-show',icon:'user-x',danger:true,run:()=>App.gsNoShow(p.id)});
      items.push({label:'Remove from session',icon:'x',danger:true,run:()=>App.gsRemove(p.id)});
    }
  }else if(scope==='type'&&payload.type){const t=payload.type;
    items.push({head:t.name+' · '+fmtDur(t.duration)});
    items.push({label:'New appointment of this type',icon:'plus',run:()=>{App.newEvent();App.edApplyType(t.id);renderEditor();}});
    items.push({label:'Remove type',icon:'trash-2',danger:true,run:()=>App.removeType(t.id)});
  }
  const customs=S.contextMenuItems.filter(it=>it.scope==='all'||it.scope===scope);
  if(customs.length){items.push({sep:true});customs.forEach(it=>items.push({label:it.label,icon:it.icon||'zap',custom:true,run:()=>runCustomItem(it,scope,payload)}));}
  if(S.isAdmin){items.push({sep:true});items.push({label:'Customize menu…',icon:'settings',run:()=>App.openCtxBuilder(scope)});}
  return items;
}
function openContextMenu(x,y,scope,payload){
  ctxItems=buildMenu(scope,payload);
  let html='<div class="ctx" id="ctx-box">';
  ctxItems.forEach((it,i)=>{
    if(it.sep){html+='<div class="ctx-sep"></div>';return;}
    if(it.head){html+='<div class="ctx-head">'+esc(it.head)+'</div>';return;}
    html+='<button class="ctx-item'+(it.danger?' danger':'')+(it.custom?' custom':'')+'" onclick="App.ctxRun('+i+')">'
      +'<span class="ci">'+ic(it.icon||'circle',16)+'</span><span class="grow" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(it.label)+'</span>'
      +(it.custom?'<span class="ctx-badge">custom</span>':'')+'</button>';
  });
  html+='</div>';
  document.getElementById("ctx-root").innerHTML=html;lucide.createIcons();
  const box=document.getElementById("ctx-box");
  const w=box.offsetWidth||220,h=box.offsetHeight||240,vw=window.innerWidth||1200,vh=window.innerHeight||800;
  let px=x,py=y;if(px+w>vw-8)px=Math.max(8,vw-w-8);if(py+h>vh-8)py=Math.max(8,vh-h-8);
  box.style.left=px+"px";box.style.top=py+"px";
  setTimeout(()=>{document.addEventListener("click",closeContextMenu,{once:true});document.addEventListener("contextmenu",closeContextMenu,{once:true});window.addEventListener("scroll",closeContextMenu,{once:true,capture:true});},0);
}

/* ===================== provider absence workflow ======================== */
function absRows(){
  const a=S.absence;const p=providerById(a.providerId);if(!p)return [];
  const start=startOfDay(new Date()),end=endOfDay(addDays(start,a.days-1));const rows=[];
  for(const e of S.events){if(!(e.assignedProviders||[]).some(x=>x.providerId===a.providerId))continue;

function parseHM(v,def){if(!v||!v.trim())return def;v=v.trim();
  // handle AM/PM format: "9:00 AM", "1:30PM", "9AM", "12:00 PM"
  var ampm=v.match(/(\d{1,2})(?::(\d{2}))?\s*(AM|PM|am|pm|a|p)/i);
  if(ampm){var h=parseInt(ampm[1],10),m=parseInt(ampm[2]||"0",10),p=ampm[3].toLowerCase();
    if(p==="pm"||p==="p"){if(h!==12)h+=12;}else{if(h===12)h=0;}
    return h*60+m;}
  // handle 24h format: "09:00", "17:30"
  var a=v.split(":");if(a.length>=2){var h2=parseInt(a[0],10),m2=parseInt(a[1],10);if(!isNaN(h2)&&!isNaN(m2))return h2*60+m2;}
  return def;}
function formatAMPM(totalMin){if(totalMin==null||isNaN(totalMin))return "";var h=Math.floor(totalMin/60),m=totalMin%60;var ampm=h>=12?"PM":"AM";h=h%12;if(h===0)h=12;return h+":"+(m<10?"0":"")+m+" "+ampm;}
function findSlots(crit){
  let provs=S.providers.filter(p=>crit.providerIds.size?crit.providerIds.has(p.id):true);
  if(crit.acceptingOnly)provs=provs.filter(p=>caseloadOf(p).accepting);
  if(crit.specialty)provs=provs.filter(p=>(p.specialties||[]).includes(crit.specialty));
  if(crit.locationId)provs=provs.filter(p=>!p.locationIds||p.locationIds.length===0||p.locationIds.includes(crit.locationId));
  if(crit.payorId)provs=provs.filter(p=>(p.acceptedPayors||[]).includes(crit.payorId));
  const rangeStart=startOfDay(crit.startDate),rangeEnd=endOfDay(addDays(rangeStart,crit.days-1));
  const allInst=[];for(const e of S.events)for(const i of expandEvent(e,rangeStart,rangeEnd)){if(apptStatusOf(i)!=="cancelled")allInst.push(i);}
  const byProv={},byRes={};
  for(const i of allInst){(i.assignedProviders||[]).forEach(ap=>{(byProv[ap.providerId]=byProv[ap.providerId]||[]).push(i);});
    (i.resourceIds||[]).forEach(rid=>{(byRes[rid]=byRes[rid]||[]).push(i);});}
  let rooms=crit.roomMode==='any'?S.resources.filter(r=>r.type==='room')
    :crit.roomMode==='none'?[]:S.resources.filter(r=>r.id===crit.roomMode);
  if(crit.locationId)rooms=rooms.filter(r=>r.locationId===crit.locationId);
  const overlaps=(list,s,e)=>(list||[]).some(i=>i.start<e&&i.end>s);
  const out=[];
  for(let dn=0;dn<crit.days;dn++){const day=addDays(rangeStart,dn);
    if(!crit.dows.has(day.getDay()))continue;
    if(closureFor(day))continue;
    for(const p of provs){const wins=(p.workingHours||{})[day.getDay()]||[];
      for(const w of wins){const a=w.start.split(":"),b=w.end.split(":");
        let from=Math.max((+a[0])*60+(+a[1]),crit.todFrom),to=Math.min((+b[0])*60+(+b[1]),crit.todTo);
        for(let m=from;m+crit.durationMin<=to;m+=crit.step){
          const s=new Date(day);s.setHours(0,m,0,0);const e=new Date(s.getTime()+crit.durationMin*60000);
          if(s<new Date())continue;                      // no past slots
          if(overlaps(byProv[p.id],s,e))continue;
          let roomId=null;
          if(crit.roomMode!=='none'){const free=rooms.find(r=>!overlaps(byRes[r.id],s,e));if(!free)continue;roomId=free.id;}
          out.push({start:s,end:e,providerId:p.id,roomId:roomId});
          if(out.length>=crit.limit){out.sort((x,y)=>x.start-y.start);return out;}
        }
      }
    }
  }
  out.sort((x,y)=>x.start-y.start);return out;
}

/* ============================ settings (cog) ============================ */
function openSettingsClear(){S.editing=null;S.sharing=null;S.groupSession=null;S.ctxBuilder=null;S.feeds=null;S.waitlistUI=null;S.fill=null;S.finder=null;closeContextMenu();}
function setRow(label,on,fn,hint){

    +'<span style="font-size:13px;color:'+(on?"var(--ink)":"var(--mut)")+'">'+esc(label)+(hint?' <span style="font-size:11px;color:var(--mut2)">'+esc(hint)+'</span>':'')+'</span>'
    +'<button class="cal-eye'+(on?'':' off')+'" data-tip="'+(on?'Hide':'Show')+'" onclick="'+fn+'" aria-label="Toggle '+esc(label)+'">'+ic(on?"eye":"eye-off",15)+'</button></div>';
}
function colorRow(label,color,kind,id,right){
  const ed=S.settings&&S.settings.colorEdit, open=ed&&ed.kind===kind&&ed.id===id;
  return '<div>'
    +'<div class="ic" style="gap:9px;padding:4px 2px">'
      +'<button class="cc-btn" onclick="App.colorEdit(\''+kind+'\',\''+id+'\')" data-tip="Edit color" style="width:22px;height:22px;border-radius:6px;background:'+color+';border:2px solid #fff;box-shadow:0 0 0 1px var(--b1)'+(open?',0 0 0 3px #0f766e44':'')+';flex-shrink:0"></button>'
      +'<span class="grow" style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(label)+'</span>'
      +(right||'')

    +'</div>'
    +(open?'<div style="padding:9px;background:#f7f6f4;border-radius:10px;margin:2px 0 8px">'+colorEditorHTML(kind,id,color)+'</div>':'')
    +'</div>';
}
function colorEditorHTML(kind,id,current){
  return '<div class="ic" style="flex-wrap:wrap;gap:5px;margin-bottom:8px">'
    +PALETTE.map(c=>'<button class="cc-btn swatch'+(c.toLowerCase()===(current||"").toLowerCase()?' on':'')+'" style="background:'+c+'" title="'+c+'" onclick="App.setEntityColor(\''+kind+'\',\''+id+'\',\''+c+'\')"></button>').join("")
    +'<label class="cc-btn swatch" title="Custom color" style="position:relative;overflow:hidden;background:conic-gradient(from 0deg,#f43f5e,#f59e0b,#84cc16,#06b6d4,#6366f1,#d946ef,#f43f5e)"><input type="color" value="'+(/^#[0-9a-fA-F]{6}$/.test(current)?current:"#0f766e")+'" oninput="App.setEntityColor(\''+kind+'\',\''+id+'\',this.value)" style="position:absolute;inset:-6px;width:160%;height:160%;opacity:0;cursor:pointer"/></label>'
    +'</div>'
    +'<div class="ic" style="gap:6px">'
      +'<input class="inp" style="flex:1;font-family:ui-monospace,monospace;font-size:12.5px" value="'+esc(current)+'" onchange="App.setEntityColor(\''+kind+'\',\''+id+'\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"/>'
      +'<button class="cc-btn ghost" style="white-space:nowrap;padding:7px 11px" onclick="App.openPalettes(\''+kind+'\',\''+id+'\')">'+ic("palette",14)+' Palettes</button>'
    +'</div>';
}
function entColl(kind){return kind==="provider"?S.providers:kind==="payor"?S.payors:kind==="type"?S.types:kind==="duration"?S.durations:kind==="calendar"?S.calendars:kind==="resource"?S.resources:kind==="location"?S.locations:kind==="program"?S.programs:null;}
function which2col(kind){return (kind==="type"||kind==="duration"||kind==="program")?4:(kind==="provider"||kind==="payor")?3:2;}
function entById(kind,id){var c=entColl(kind);return c?c.find(function(x){return x.id===id;}):null;}
function entVisible(it){return !it||it.visible!==false;}
function entName(kind,it){return kind==="duration"?(it.minutes+" min"):(it.name||"");}
function entSub(kind,it){if(kind==="provider")return it.credential||"";if(kind==="type")return fmtDur(it.duration);if(kind==="resource")return it.type||"";if(kind==="location")return it.short||it.address||"";if(kind==="calendar")return it.shared?"Shared":"";return "";}
function entInUse(kind,id){var ev=S.events||[],pts=S.patients||[];if(kind==="type")return ev.some(function(e){return e.typeId===id;});if(kind==="calendar")return ev.some(function(e){return e.calendarId===id;});if(kind==="payor")return pts.some(function(p){return p.payorId===id;})||S.providers.some(function(p){return (p.acceptedPayors||[]).indexOf(id)>=0;});if(kind==="provider")return pts.some(function(p){return p.usualProviderId===id;});if(kind==="location")return S.resources.some(function(r){return r.locationId===id;})||S.providers.some(function(p){return (p.locationIds||[]).indexOf(id)>=0;});return false;}
function efL(t){return '<div style="font-size:10.5px;font-weight:700;color:var(--mut2);text-transform:uppercase;letter-spacing:.04em;margin:9px 0 3px">'+t+'</div>';}
function efChips(kind,id,field,opts,sel){sel=sel||[];return '<div class="ic" style="flex-wrap:wrap;gap:5px">'+opts.map(function(o){var on=sel.indexOf(o.id)>=0;return '<button class="cc-btn" onclick="App.toggleInList(\''+kind+'\',\''+id+'\',\''+field+'\',\''+o.id+'\')" style="font-size:11.5px;padding:4px 9px;border-radius:999px;border:1px solid '+(on?o.color:'var(--b1)')+';background:'+(on?(o.color+'1f'):'#fff')+';color:'+(on?'var(--ink)':'var(--mut)')+';font-weight:'+(on?'600':'400')+'">'+esc(o.name)+'</button>';}).join("")+'</div>';}
function manageRow(kind,it){
  var ed=S.settings&&S.settings.editing, open=ed&&ed.kind===kind&&ed.id===it.id, vis=entVisible(it), nm=entName(kind,it), sub=entSub(kind,it);
  return '<div class="ent-row" style="'+(open?'background:#f7f6f4;':'')+'">'
    +'<div class="ic" style="gap:9px;padding:5px 6px;'+(vis?'':'opacity:.42;')+'">'
      +'<button class="cc-btn" onclick="App.editEntity(\''+kind+'\',\''+it.id+'\')" data-tip="Edit color" style="width:22px;height:22px;border-radius:6px;background:'+(it.color||"#94a3b8")+';border:2px solid #fff;box-shadow:0 0 0 1px var(--b1)'+(open?',0 0 0 3px #0f766e44':'')+';flex-shrink:0;cursor:pointer"></button>'
      +'<span class="grow" style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(nm)+(sub?' <span style="color:var(--mut2);font-weight:400;font-size:11.5px">· '+esc(sub)+'</span>':'')+'</span>'
      +'<span class="ent-actions">'
      +'<button class="cc-btn" data-tip="'+(vis?'Hide':'Show')+'" onclick="App.toggleVisible(\''+kind+'\',\''+it.id+'\')" style="background:none;border:none;color:var(--mut2);padding:3px;flex-shrink:0">'+ic(vis?"eye":"eye-off",15)+'</button>'
      +'<button class="cc-btn" data-tip="Edit" onclick="App.editEntity(\''+kind+'\',\''+it.id+'\')" style="background:none;border:none;color:'+(open?'var(--teal)':'var(--mut2)')+';padding:3px;flex-shrink:0">'+ic("pencil",15)+'</button>'
      +'<button class="cc-btn" data-tip="Delete" onclick="App.removeEntity(\''+kind+'\',\''+it.id+'\')" style="background:none;border:none;color:var(--mut3);padding:3px;flex-shrink:0">'+ic("trash-2",15)+'</button>'
      +'</span>'
    +'</div>'
    +(open?'<div style="padding:2px 10px 12px">'+entityEditor(kind,it)+'</div>':'')
    +'</div>';
}
function entityEditor(kind,it){

  else{h+=efL("Name")+'<input class="inp" style="width:100%" value="'+esc(it.name||"")+'" placeholder="Name" oninput="App.setField(\''+kind+'\',\''+id+'\',\'name\',this.value)"/>';}

    h+=efL("Credential / title")+'<input class="inp" style="width:100%" value="'+esc(it.credential||"")+'" placeholder="e.g. Psychologist, LMFT" oninput="App.setField(\'provider\',\''+id+'\',\'credential\',this.value)"/>';
    h+='<div class="ic" style="gap:18px;margin-top:11px;flex-wrap:wrap">'
      +'<label class="ic" style="gap:8px;cursor:pointer"><span style="font-size:12.5px;color:var(--mut)">Accepting new</span><button class="tgl'+(it.acceptingNew?' on':'')+'" onclick="App.toggleBool(\'provider\',\''+id+'\',\'acceptingNew\')"></button></label>'
      +'<div class="ic" style="gap:8px"><span style="font-size:12.5px;color:var(--mut)">Caseload cap</span><input class="inp" type="number" min="0" style="width:80px" value="'+(it.caseloadCap!=null?it.caseloadCap:"")+'" oninput="App.setNumField(\'provider\',\''+id+'\',\'caseloadCap\',this.value)"/></div>'
      +'</div>';
    h+=efL("Specialties (comma-separated)")+'<input class="inp" style="width:100%" value="'+esc((it.specialties||[]).join(", "))+'" placeholder="CBT, EMDR" oninput="App.setTags(\'provider\',\''+id+'\',\'specialties\',this.value)"/>';
    var gsVal=it.groupSessionsOverride;var gsLabel=gsVal===null||gsVal===undefined?"Inherit practice":gsVal?"Enabled":"Disabled";
    h+=efL("Group sessions")+'<select class="inp" style="width:160px" onchange="App.setGroupOverride(\''+id+'\',this.value)"><option value="inherit" '+(gsVal===null||gsVal===undefined?"selected":"")+'>Inherit practice</option><option value="true" '+(gsVal===true?"selected":"")+'>Enabled</option><option value="false" '+(gsVal===false?"selected":"")+'>Disabled</option></select>';

  }
  if(kind==="type"){

    h+=efL("Chargemaster CPT code")+'<select class="inp" style="width:100%" onchange="App.setField(\'type\',\''+id+'\',\'serviceCode\',this.value)"><option value="">— None —</option>'+CHARGEMASTER_SERVICES.map(function(s){return '<option value="'+s.code+'" '+(it.serviceCode===s.code?"selected":"")+'>'+s.code+' — '+esc(s.desc)+'</option>';}).join("")+'</select>';
    h+=efL("Forms (comma-separated)")+'<input class="inp" style="width:100%" value="'+esc((it.forms||[]).join(", "))+'" placeholder="Intake packet, Consent" oninput="App.setTags(\'type\',\''+id+'\',\'forms\',this.value)"/>';
  }
  if(kind==="calendar"){
    h+='<label class="ic" style="gap:8px;margin-top:11px;cursor:pointer"><span style="font-size:12.5px;color:var(--mut)">Shared calendar</span><button class="tgl'+(it.shared?' on':'')+'" onclick="App.toggleBool(\'calendar\',\''+id+'\',\'shared\')"></button></label>';
  }
  if(kind==="resource"){
    h+=efL("Type")+'<select class="inp" style="width:100%" onchange="App.setField(\'resource\',\''+id+'\',\'type\',this.value)">'+["room","telehealth","equipment","group"].map(function(o){return '<option value="'+o+'" '+(it.type===o?"selected":"")+'>'+o.charAt(0).toUpperCase()+o.slice(1)+'</option>';}).join("")+'</select>';
    h+=efL("Location")+'<select class="inp" style="width:100%" onchange="App.setField(\'resource\',\''+id+'\',\'locationId\',this.value)"><option value="">— none —</option>'+S.locations.map(function(l){return '<option value="'+l.id+'" '+(it.locationId===l.id?"selected":"")+'>'+esc(l.name)+'</option>';}).join("")+'</select>';
  }
  if(kind==="location"){
    h+=efL("Short label")+'<input class="inp" style="width:100%" value="'+esc(it.short||"")+'" placeholder="e.g. Downtown" oninput="App.setField(\'location\',\''+id+'\',\'short\',this.value)"/>';
    h+=efL("Address")+'<input class="inp" style="width:100%" value="'+esc(it.address||"")+'" placeholder="Street address" oninput="App.setField(\'location\',\''+id+'\',\'address\',this.value)"/>';
  }
  if(kind==="program"){
    h+=efL("Description")+'<input class="inp" style="width:100%" value="'+esc(it.description||"")+'" placeholder="Program description" oninput="App.setField(\'program\',\''+id+'\',\'description\',this.value)"/>';

    h+=efL("Modality")+'<select class="inp" style="width:100%" onchange="App.setField(\'program\',\''+id+'\',\'modality\',this.value)">'+PROGRAM_MODALITY.map(function(m){return '<option value="'+m+'" '+(it.modality===m?"selected":"")+'>'+m+'</option>';}).join("")+'</select>';

function listFilterRows(kind,list,lf,matchExtra){
  var f=(S.settings.search||"").trim().toLowerCase();
  function has(s){return String(s).toLowerCase().indexOf(f)>-1;}
  var title=kind==="provider"?"providers":"payors";
  var gm=!!f&&has(title);
  var lff=(lf||"").trim().toLowerCase();
  var rows=list.filter(function(it){
    var ex=matchExtra?matchExtra(it):"";
    var passG=!f||gm||has(entName(kind,it))||has(ex);
    var passL=!lff||(entName(kind,it)+" "+ex).toLowerCase().indexOf(lff)>-1;
    return passG&&passL;
  }).map(function(it){return manageRow(kind,it);}).join("");
  return rows||'<div style="font-size:12px;color:var(--mut2);padding:5px 2px">No matches</div>';
}

/* --- drag-and-drop reorder for settings toolbar/sidebar rows --- */
var _reorderDrag=null;
function wireReorderDrag(){
  document.querySelectorAll('.reorder-row').forEach(function(row){
    row.addEventListener('dragstart',function(e){
      _reorderDrag={kind:row.dataset.reorderKind,key:row.dataset.reorderKey};
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',row.dataset.reorderKey);
    });
    row.addEventListener('dragend',function(){
      row.classList.remove('dragging');
      document.querySelectorAll('.drag-over-above,.drag-over-below').forEach(function(el){el.classList.remove('drag-over-above','drag-over-below');});
      _reorderDrag=null;
    });
    row.addEventListener('dragover',function(e){
      if(!_reorderDrag||_reorderDrag.kind!==row.dataset.reorderKind)return;
      e.preventDefault();e.dataTransfer.dropEffect='move';
      var rect=row.getBoundingClientRect();var midY=rect.top+rect.height/2;
      row.classList.remove('drag-over-above','drag-over-below');
      if(e.clientY<midY)row.classList.add('drag-over-above');
      else row.classList.add('drag-over-below');
    });
    row.addEventListener('dragleave',function(){
      row.classList.remove('drag-over-above','drag-over-below');
    });
    row.addEventListener('drop',function(e){
      e.preventDefault();
      row.classList.remove('drag-over-above','drag-over-below');
      if(!_reorderDrag||_reorderDrag.kind!==row.dataset.reorderKind)return;
      var kind=_reorderDrag.kind;
      var fromKey=_reorderDrag.key;
      var toKey=row.dataset.reorderKey;
      if(fromKey===toKey)return;
      var arr=kind==='tool'?S.ui.toolOrder:S.ui.sectionOrder;
      var fi=arr.indexOf(fromKey),ti=arr.indexOf(toKey);
      if(fi<0||ti<0)return;
      var rect=row.getBoundingClientRect();var above=e.clientY<rect.top+rect.height/2;
      arr.splice(fi,1);
      var newTi=arr.indexOf(toKey);
      if(above)arr.splice(newTi,0,fromKey);
      else arr.splice(newTi+1,0,fromKey);
      _reorderDrag=null;
      if(kind==='tool'){renderTopbar();lucide.createIcons();}else{renderSidebar();lucide.createIcons();}
      var el=document.getElementById('set-c1');
      if(el){el.innerHTML=settingsColHTML(1);lucide.createIcons();wireReorderDrag();}
    });
  });
}

/* =========================== drag to reschedule ======================== */
let dragCtx=null;let dragCancel=null;
function applyReschedule(ev,instKey,start,end,newProviderId){
  pushUndo();
  if(ev.recurrence){ev.overrides=ev.overrides||{};ev.overrides[instKey]=Object.assign({},ev.overrides[instKey]||{},{start:start,end:end});}
  else{ev.start=start;ev.end=end;}
  // reassign provider if dragged to a different column
  var reassigned=null;
  if(newProviderId){
    var oldProvs=(ev.assignedProviders||[]).map(function(a){return a.providerId;});
    if(oldProvs.length&&oldProvs.indexOf(newProviderId)===-1){
      var np=providerById(newProviderId);reassigned=np?np.name.replace(/,.*$/,""):newProviderId;
      ev.assignedProviders=[{providerId:newProviderId,role:(ev.assignedProviders[0]||{}).role||"primary"}];
    } else if(!oldProvs.length){
      ev.assignedProviders=[{providerId:newProviderId,role:"primary"}];
      var np2=providerById(newProviderId);reassigned=np2?np2.name.replace(/,.*$/,""):newProviderId;
    }
  }
  logHist(ev,"Rescheduled → "+fmtDMY(start)+" "+fmtRange(start,end)+(reassigned?" · reassigned to "+reassigned:""));

/* drag helper: resolve grid column from clientX */
function dragResolveCol(clientX){
  var scroll=document.getElementById("grid-scroll");if(!scroll)return null;
  var grid=scroll.firstElementChild;if(!grid)return null;
  var cols=grid.children;if(!cols||cols.length<2)return null;
  // skip gutter (index 0), columns are index 1..N
  for(var i=1;i<cols.length;i++){
    var r=cols[i].getBoundingClientRect();
    if(clientX>=r.left&&clientX<=r.right)return {index:i-1,el:cols[i],rect:r};
  }
  return null;
}
/* drag helper: resolve My Day provider column from clientX */
function dragResolveDayCol(clientX){
  var provCols=document.querySelectorAll("[data-prov-col]");if(!provCols.length)return null;
  for(var i=0;i<provCols.length;i++){
    var r=provCols[i].getBoundingClientRect();
    if(clientX>=r.left&&clientX<=r.right)return {index:i,providerId:provCols[i].getAttribute("data-prov-col"),el:provCols[i],rect:r};
  }
  return null;
}

    S.editing.attendees=(S.editing.attendees||[]).concat({name:em.split("@")[0],email:em,status:"needs-action"});
    document.getElementById("ed-attendees").innerHTML=attendeesHTML(S.editing);lucide.createIcons();document.getElementById("ed-att-email").focus();},
  edRemoveAttendee(idx){S.editing.attendees.splice(idx,1);document.getElementById("ed-attendees").innerHTML=attendeesHTML(S.editing);lucide.createIcons();},
  edAddReminder(v){if(v==="")return;S.editing.reminders=(S.editing.reminders||[]).concat({minutes:parseInt(v)});document.getElementById("ed-reminders").innerHTML=remindersHTML(S.editing);lucide.createIcons();},
  edRemoveReminder(idx){S.editing.reminders.splice(idx,1);document.getElementById("ed-reminders").innerHTML=remindersHTML(S.editing);lucide.createIcons();},
  edSave(){const d=S.editing;if(!d.title.trim())return;if(new Date(d.end)<new Date(d.start)){showToast("Invalid time","End time must be after the start time.");return;}if(!requirePerm(d.__new?"book":"edit"))return;
    // session cap gate: block if all enrolled programs are at cap (admin override)
    if(d.__new&&d.patientId&&sessionCapBlocked(d.patientId)&&!can("admin")){showToast("Session cap reached","This client has used all authorized sessions. Admin override required.");return;}
    if(d.__new&&d.patientId&&sessionCapBlocked(d.patientId)&&can("admin")){showToast("Admin override","Booking past session cap — admin override applied.");}
    // increment sessionsUsed on save for new appointments
    if(d.__new&&d.patientId){activeEnrollments(d.patientId).forEach(enr=>{const prg=programById(enr.programId);if(!prg)return;const t=d.typeId?typeById(d.typeId):null;const code=t?t.serviceCode:d._cmsCode;if(code&&prg.serviceCodes.indexOf(code)>-1)enr.sessionsUsed=Math.min(enr.sessionsUsed+1,enr.sessionsAuthorized);});}
    pushUndo();const orig=S.events.find(x=>x.id===d.id);const e=Object.assign({},d);delete e.__new;const fromWl=d.__fromWaitlist;delete e.__fromWaitlist;logHist(e,d.__new?"Created":"Edited details");upsertEvent(e);
    if(e.patientId){if(orig&&!d.__new&&new Date(orig.start).getTime()!==new Date(e.start).getTime()){logHist(e,"Rescheduled");logAttendance(e.patientId,e.id,dateKey(new Date(e.start)),"reschedule");}var __dk=S.editingDk||dateKey(new Date(e.start));var __st=(e.statusByDate&&e.statusByDate[__dk]&&e.statusByDate[__dk].status)||null;var __k=__st?attnKindForStatus(__st):null;if(__k)logAttendance(e.patientId,e.id,__dk,__k);}
    if(fromWl)S.waitlist=(S.waitlist||[]).filter(x=>x.id!==fromWl);
    S.editing=null;renderEditor();render();},
  edDelete(){if(!requirePerm("delete"))return;pushUndo();deleteEvent(S.editing.id);S.editing=null;renderEditor();render();},
  // share
  openShare(id){const c=calById(id);S.sharing=JSON.parse(JSON.stringify(c));renderShare();},
  closeShare(){S.sharing=null;renderShare();},
  shareAdd(){const i=document.getElementById("share-email");const em=(i.value||"").trim();if(!em.includes("@")||S.sharing.sharedWith.includes(em))return;
    S.sharing.shared=true;S.sharing.sharedWith.push(em);i.value="";document.getElementById("share-list").innerHTML=shareListHTML(S.sharing);lucide.createIcons();},
  shareRemove(idx){S.sharing.sharedWith.splice(idx,1);document.getElementById("share-list").innerHTML=shareListHTML(S.sharing);lucide.createIcons();},
  shareSave(){const i=S.calendars.findIndex(c=>c.id===S.sharing.id);if(i>=0)S.calendars[i]=S.sharing;S.sharing=null;renderShare();render();},
};
window.App=App;

document.getElementById("ics-file").addEventListener("change",function(e){
  const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{const imported=parseICS(String(r.result),defaultCalId());imported.forEach(upsertEvent);render();showToast("Imported",imported.length+" event(s) added");};
  r.readAsText(f);e.target.value="";
});
try{if(typeof Notification!=="undefined"&&Notification.permission==="default")Notification.requestPermission().catch(()=>{});}catch(e){}
document.addEventListener('keydown',function(e){
  var t=e.target;var tag=(t&&t.tagName)||"";
  if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"||(t&&t.isContentEditable))return; // leave native undo alone while typing
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key.toLowerCase()==='z'){e.preventDefault();App.undo();}
  else if((e.ctrlKey||e.metaKey)&&(e.key.toLowerCase()==='y'||(e.shiftKey&&e.key.toLowerCase()==='z'))){e.preventDefault();App.redo();}
  else if(e.key==="Escape"){var _kd=document.getElementById('kpi-drill-root');if(_kd&&_kd.innerHTML){App.kpiDrillClose();return;}var _cr=document.getElementById('ctx-root');if(_cr&&_cr.innerHTML){closeContextMenu();return;}}
});
document.addEventListener('keydown',function(e){if(e.key!=='Escape')return;if(dragCancel){dragCancel();return;}if(S.settings&&S.settings.paletteFor){App.closePalettes();return;}if(S.editing){App.closeEditor();return;}if(S.sharing){App.closeShare();return;}if(S.groupSession){App.gsClose();return;}if(S.ctxBuilder){App.cmClose();return;}if(S.absence){App.absClose();return;}if(S.feeds){App.feedsClose();return;}if(S.waitlistUI){App.wlClose();return;}if(S.fill){App.fillClose();return;}if(S.finder){App.sfClose();return;}if(S.settings){App.settingsClose();return;}if(S.myTeam&&S.myTeam.open){S.myTeam.open=false;renderTopbar();lucide.createIcons();if(App._myTeamDocClick){document.removeEventListener('click',App._myTeamDocClick,true);App._myTeamDocClick=null;}return;}if(S.viewAsOpen){S.viewAsOpen=false;renderTopbar();lucide.createIcons();if(App._viewAsDocClick){document.removeEventListener('click',App._viewAsDocClick,true);App._viewAsDocClick=null;}return;}});
setInterval(()=>{S.now=new Date();if(S.view==="week"||S.view==="day"||S.view==="month"||S.view==="agenda"){/* light refresh of now-line */ if(S.view!=="agenda")renderMain();}},30000);
/* ===== custom dropdowns: enhance native <select> on desktop, leave native on touch ===== */
const IS_TOUCH=(typeof matchMedia==="function")?matchMedia("(pointer:coarse)").matches:false;
function closeAllDD(){document.querySelectorAll(".dd.dd-open").forEach(w=>{w.classList.remove("dd-open");const m=w.querySelector(".dd-menu");if(m)m.removeAttribute("style");});}
function openDD(wrap,menu,face){
  closeAllDD();wrap.classList.add("dd-open");
  const r=face.getBoundingClientRect();
  menu.style.position="fixed";menu.style.left=r.left+"px";menu.style.width=r.width+"px";menu.style.zIndex="99999";
  const below=window.innerHeight-r.bottom,want=Math.min(menu.scrollHeight+2,260);
  if(below<want+8&&r.top>below){menu.style.bottom=(window.innerHeight-r.top+4)+"px";menu.style.maxHeight=Math.min(r.top-12,260)+"px";}
  else{menu.style.top=(r.bottom+4)+"px";menu.style.maxHeight=Math.min(below-12,260)+"px";}
  const on=menu.querySelector(".dd-opt.on");if(on&&on.scrollIntoView)on.scrollIntoView({block:"nearest"});
}
function enhanceDropdowns(root){
  if(IS_TOUCH)return;
  (root||document).querySelectorAll("select:not([data-dd])").forEach(sel=>{
    sel.setAttribute("data-dd","1");sel.setAttribute("tabindex","-1");sel.setAttribute("aria-hidden","true");
    const wrap=document.createElement("div");wrap.className="dd";
    if(sel.classList.contains("grow")){wrap.style.flex="1";wrap.style.minWidth="0";}
    else if(sel.style.width==="100%"){wrap.style.display="block";wrap.style.width="100%";}
    else{wrap.style.display="inline-block";wrap.style.verticalAlign="middle";}
    sel.parentNode.insertBefore(wrap,sel);wrap.appendChild(sel);
    const face=document.createElement("button");face.type="button";face.className="dd-face";
    const menu=document.createElement("div");menu.className="dd-menu";
    wrap.appendChild(face);wrap.appendChild(menu);
    const sync=()=>{
      const o=sel.options[sel.selectedIndex];
      face.textContent="";
      const lbl=document.createElement("span");lbl.className="dd-face-lbl";lbl.textContent=o?o.textContent:"";
      const car=document.createElement("span");car.className="dd-caret";
      face.appendChild(lbl);face.appendChild(car);
      menu.textContent="";
      Array.prototype.forEach.call(sel.options,(op,i)=>{const d=document.createElement("div");d.className="dd-opt"+(i===sel.selectedIndex?" on":"");d.setAttribute("data-i",i);d.textContent=op.textContent;menu.appendChild(d);});
      if(sel.disabled)wrap.classList.add("dd-dis");else wrap.classList.remove("dd-dis");
    };
    sync();
    face.setAttribute("aria-haspopup","listbox");
    const ddMove=(d)=>{const n=sel.options.length;if(!n)return;let i=sel.selectedIndex;if(d==="first")i=0;else if(d==="last")i=n-1;else i=Math.max(0,Math.min(n-1,i+d));if(i!==sel.selectedIndex&&sel.options[i]&&!sel.options[i].disabled){sel.selectedIndex=i;sel.dispatchEvent(new Event("change",{bubbles:true}));sync();}};
    face.addEventListener("mousedown",e=>e.preventDefault());
    face.addEventListener("click",e=>{e.stopPropagation();if(sel.disabled)return;if(wrap.classList.contains("dd-open"))closeAllDD();else openDD(wrap,menu,face);});
    face.addEventListener("keydown",e=>{if(sel.disabled)return;const k=e.key;if(k==="ArrowDown"||k==="ArrowRight"){e.preventDefault();ddMove(1);}else if(k==="ArrowUp"||k==="ArrowLeft"){e.preventDefault();ddMove(-1);}else if(k==="Home"){e.preventDefault();ddMove("first");}else if(k==="End"){e.preventDefault();ddMove("last");}else if(k==="Enter"||k===" "){e.preventDefault();if(wrap.classList.contains("dd-open"))closeAllDD();else openDD(wrap,menu,face);}else if(k==="Escape"){closeAllDD();}});
    menu.addEventListener("click",e=>{const it=e.target.closest(".dd-opt");if(!it)return;const i=+it.getAttribute("data-i");if(i!==sel.selectedIndex){sel.selectedIndex=i;sel.dispatchEvent(new Event("change",{bubbles:true}));}sync();closeAllDD();});
    sel.addEventListener("change",sync);
  });
}
if(!IS_TOUCH){
  document.addEventListener("click",closeAllDD);
  document.addEventListener("scroll",closeAllDD,true);
  window.addEventListener("resize",closeAllDD);
  document.addEventListener("keydown",e=>{if(e.key==="Escape")closeAllDD();});
  const _ci=lucide.createIcons.bind(lucide);
  lucide.createIcons=function(){_ci();try{enhanceDropdowns();}catch(e){}};
}
render();
scheduleReminders();
lucide.createIcons();
